#!/bin/bash

# Docker Compose setup for Graph Hierarchy Explorer

version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6
    container_name: graph-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: graph_hierarchy
    volumes:
      - mongodb_data:/data/db
    networks:
      - graph-network
    healthcheck:
      test: echo 'db.adminCommand("ping")' | mongosh localhost/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: graph-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/graph_hierarchy
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:3000
      PORT: 5000
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    networks:
      - graph-network
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:5000/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: graph-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:5000
    depends_on:
      - backend
    networks:
      - graph-network
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:3000/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongodb_data:
    driver: local

networks:
  graph-network:
    driver: bridge
