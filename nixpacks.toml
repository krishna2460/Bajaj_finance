[phases.setup]
nixPkgs = ["nodejs-18_x", "yarn"]

[phases.install]
cmds = [
  "cd backend && npm install",
  "cd ../frontend && npm install"
]

[phases.build]
cmds = [
  "cd frontend && npm run build",
  "cd ../backend && cp -r ../frontend/dist ./public"
]

[start]
cmd = "cd backend && node src/index.js"